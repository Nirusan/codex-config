# Codex configuration (team/user level)

model = "gpt-5.4"
model_reasoning_effort = "xhigh"
approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "cached"
personality = "friendly"

[features]
web_search_request = true

# MCP servers (add your API keys where required)

[mcp_servers.openai-docs]
url = "https://developers.openai.com/mcp"

[mcp_servers.context7]
url = "https://mcp.context7.com/mcp"

[mcp_servers.brave-search]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-brave-search"]

[mcp_servers.brave-search.env]
BRAVE_API_KEY = "YOUR_BRAVE_API_KEY_HERE"

[mcp_servers.firecrawl]
command = "npx"
args = ["-y", "firecrawl-mcp"]

[mcp_servers.firecrawl.env]
FIRECRAWL_API_KEY = "YOUR_FIRECRAWL_API_KEY_HERE"

[mcp_servers.supabase]
url = "https://mcp.supabase.com/mcp?project_ref=YOUR_PROJECT_REF"

[mcp_servers.exa]
url = "https://mcp.exa.ai/mcp"

[mcp_servers.exa.http_headers]
Authorization = "YOUR_AUTHORIZATION_HERE"

[mcp_servers.chrome-devtools]
command = "npx"
args = ["chrome-devtools-mcp@latest"]

[mcp_servers.n8n-mcp]
command = "npx"
args = ["n8n-mcp"]

[mcp_servers.n8n-mcp.env]
DISABLE_CONSOLE_OUTPUT = "true"
LOG_LEVEL = "error"
MCP_MODE = "stdio"
N8N_API_KEY = "YOUR_N8N_API_KEY_HERE"
N8N_API_URL = "https://your-service.example.com"

[mcp_servers.gemini-design-mcp]
command = "node"
args = ["/path/to/your/local/tool"]

[mcp_servers.gemini-design-mcp.env]
GEMINI_API_KEY = "YOUR_GEMINI_API_KEY_HERE"
GEMINI_MODEL = "gemini-3-pro-preview"

[notice.model_migrations]
"gpt-5.2" = "gpt-5.2-codex"

[plugins."github@openai-curated"]
enabled = true
