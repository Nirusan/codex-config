# Codex configuration (team/user level)

model = "gpt-5.2"
model_reasoning_effort = "xhigh"
approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "cached"

[features]
web_search_request = true

# MCP servers (add your API keys where required)
[mcp_servers.openai-docs]
url = "https://developers.openai.com/mcp"

[mcp_servers.context7]
url = "https://mcp.context7.com/mcp"

[mcp_servers.brave-search]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-brave-search"]
env = { BRAVE_API_KEY = "YOUR_API_KEY_HERE" }

[mcp_servers.firecrawl]
command = "npx"
args = ["-y", "firecrawl-mcp"]
env = { FIRECRAWL_API_KEY = "YOUR_API_KEY_HERE" }

[mcp_servers.supabase]
url = "https://mcp.supabase.com/mcp"

[mcp_servers.exa]
url = "https://mcp.exa.ai/mcp"
http_headers = { Authorization = "Bearer YOUR_API_KEY_HERE" }

[mcp_servers.chrome-devtools]
command = "npx"
args = ["chrome-devtools-mcp@latest"]

[mcp_servers.gemini-design-mcp]
command = "npx"
args = [
  "mcp-remote",
  "https://gemini-design-mcp-server-production.up.railway.app/mcp",
  "--header",
  "YOUR_API_KEY_HERE"
]

[mcp_servers.n8n-mcp]
command = "npx"
args = ["n8n-mcp"]
env = {
  MCP_MODE = "stdio",
  LOG_LEVEL = "error",
  DISABLE_CONSOLE_OUTPUT = "true",
  N8N_API_URL = "YOUR_API_KEY_HERE",
  N8N_API_KEY = "YOUR_API_KEY_HERE"
}
